<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Projects</title>
    <!-- Link your existing CSS file here -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="nav-controls">
        <button class="control-btn" id="resume-back">
            <img src="assets/images/back.png" class="back-icon" alt="Go Back to Home">
        </button>

        <button class="control-btn" id="theme-switcher" aria-label="Toggle Dark Mode">
            <img src="assets/images/theme.png" class="mode-icon" alt="Toggle Theme">
        </button>
    </div>

    <header>
        <h1>Selected Work</h1>
    </header>

    <div class="container">
        <!-- Filter Navigation -->
        <div class="cta-container" style="margin-bottom: 40px;">
            <button class="btn btn-secondary">All</button>
            <button class="btn btn-secondary">UI/UX</button>
            <button class="btn btn-secondary">Branding</button>
            <button class="btn btn-secondary">Development</button>
        </div>

        <!-- Project Grid -->
        <div class="project-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;">
            
            <!-- Project Card 1 -->
            <div class="project-card">
                <img src="project-image.jpg" alt="Project 1" style="width: 100%; border-radius: 8px;">
                <h3>Quantum App Design</h3>
                <p>SaaS platform for data analytics</p>
            </div>

            <!-- Project Card 2 -->
            <div class="project-card">
                <img src="project-image.jpg" alt="Project 2" style="width: 100%; border-radius: 8px;">
                <h3>Mobile App Design</h3>
                <p>User-centric mobile experience</p>
            </div>

            <!-- Project Card 3 -->
            <div class="project-card">
                <img src="project-image.jpg" alt="Project 3" style="width: 100%; border-radius: 8px;">
                <h3>Brand Identity</h3>
                <p>Complete logo and style guide</p>
            </div>

        </div>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
