<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search</title>
    <script>
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.documentElement.classList.add('dark-mode');
        }
  </script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="movie_db">
    <header>
        <h1>Movie Availability Search</h1>
    </header>

    <div class="container">
        <div class="col">
            <input type="text" id="myInput">
        </div>

        <div class="col">
            <button id="search">Search</button>
        </div>
    </div>

    <div class="container">
        <div class="col">
            <h3>Streaming</h3>
            <ul class="streaming-list">

            </ul>
        </div>

        <div class="col">
            <h3>Buy</h3>
            <ul class="buy-list">
                
            </ul>
        </div>

        <div class="col">
            <h3>Rent</h3>
            <ul class="rent-list">
                
            </ul>
        </div>
    </div>

    <div class="legal">
    <!-- TMDB Legal Disclaimer (Mandatory Wording) -->
    <p class="attribution-text">
        This product uses the TMDB API but is not endorsed or certified by TMDB. 
        Movie data and images provided by <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a>.
    </p>
    
    <!-- JustWatch Legal Disclaimer & Branded Anchor Link (Mandatory Wording) -->
    <p class="attribution-text">
        Streaming availability data provided/// by <a href="https://www.justwatch.com" target="_blank" rel="noopener">JustWatch</a>.
    </p>
</div>
    <script src="/js/movie_db.js"></script>
</body>
</html>
