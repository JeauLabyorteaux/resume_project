<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="movie_db">
    

    <div class="container">
        <div class="col">
            <input type="text" id="myInput">
        </div>

        <div class="col">
            <button id="search">Search</button>
        </div>
    </div>

    <div class="container">
        <div class="col">
            <h3>Streaming</h3>
            <ul class="streaming-list">

            </ul>
        </div>

        <div class="col">
            <h3>Buy</h3>
            <ul class="buy-list">
                
            </ul>
        </div>

        <div class="col">
            <h3>Rent</h3>
            <ul class="rent-list">
                
            </ul>
        </div>
    </div>

    <div class="legal">
        <p>
            JustWatch Attribution Required
        In order to use this data you must attribute the source of the data as JustWatch. 
        If we find any usage not complying with these terms we will revoke access to the API.
<       /p>

    </div>
    <script src="movie_db.js"></script>
</body>
</html>
